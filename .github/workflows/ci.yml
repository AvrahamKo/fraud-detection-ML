name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # Install lightweight subset for CI (skip heavy Bayesian stack)
          pip install pandas numpy pyarrow scikit-learn lightgbm optuna scipy matplotlib seaborn
          pip install pytest pytest-cov
          pip install -e .

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=src --cov-report=term-missing

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install flake8
        run: pip install flake8
      - name: Lint
        run: flake8 src/ tests/ --max-line-length=100 --ignore=E203,W503
